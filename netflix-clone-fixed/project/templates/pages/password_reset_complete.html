{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflex - Password Reset Complete</title>
    <link rel="icon" href="{% static 'pic/netflix.webp' %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Inter:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/site.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive-fixes.css' %}">
</head>
<body class="signin">
    <a href="{% url 'landing' %}"><img src="{% static 'pic/netflixname.png' %}" class="logoinsignin"></a>
    <hr class="dividersignin">
    <div class="freewatching">
        <div class="signin-card">
            <h2 class="signin-card__title">Password reset!</h2>
            <p class="signin-card__subtitle">
                Your password has been changed successfully. You can now sign
                in with your new password.
            </p>
            <form class="signinform" action="{% url 'signin' %}" method="get">
                <button type="submit" class="signin-submit">Sign in</button>
            </form>
        </div>
    </div>
</body>
</html>
