{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Profiles - Netflex</title>
    <link rel="icon" href="{% static 'pic/netflix.webp' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="profiles-body">
    <a href="{% url 'landing' %}" class="profiles-logo">
        <img src="{% static 'img/netflixname.png' %}" alt="Netflex">
    </a>
    <main class="profiles-screen">
        <h1>Manage Profiles</h1>

        {% if messages %}
        {% for message in messages %}<p class="signin-error">{{ message }}</p>{% endfor %}
        {% endif %}

        <div class="profiles-grid">
            {% for profile in profiles %}
            <a class="profile-tile" href="{% url 'edit_profile' profile.id %}">
                <div class="profile-tile-avatar avatar-{{ profile.avatar_color }} editable">
                    {{ profile.initial }}
                    <span class="pencil-badge">✎</span>
                </div>
                <span>{{ profile.name }}</span>
            </a>
            {% endfor %}
            {% if profiles|length < 5 %}
            <a class="profile-tile profile-tile-add" href="{% url 'add_profile' %}">
                <div class="profile-tile-avatar avatar-add">+</div>
                <span>Add Profile</span>
            </a>
            {% endif %}
        </div>
        <a href="{% url 'profiles' %}" class="btn-manage-profiles">Done</a>
    </main>
</body>
</html>
